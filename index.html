<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DO OK Scanner - Slim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            overflow: hidden; 
        }
        #reader { 
            width: 100%; 
            border-radius: 1rem; 
            overflow: hidden; 
            background: #000; 
            border: 2px solid #1e293b; 
        }
        
        #reader video {
            object-fit: cover !important;
            /* Efek gelap pada area video keseluruhan */
            filter: brightness(0.3);
        }

        /* Memastikan kotak pemindaian muncul besar di tengah */
        #reader__scan_region {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            z-index: 5;
        }
        
        /* Membuat area scan (viewfinder) kembali terang */
        #reader__scan_region canvas {
            filter: brightness(3.3); /* Menetralkan filter video hanya di area scan */
            border-radius: 8px;
        }

        /* Mengatur tampilan garis kotak pemindaian */
        #reader__scan_region svg {
            stroke: #10b981 !important;
            stroke-width: 4px !important;
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.8));
        }

        /* Menghilangkan elemen teks bawaan library */
        #reader__dashboard_section_csr span { display: none !important; }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(51, 65, 85, 0.2); }
        .hidden { display: none !important; }
        .scan-active { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); border-color: #10b981 !important; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 max-w-md mx-auto">

    <!-- Header -->
    <header class="flex justify-between items-end mb-2">
        <div>
            <h1 class="text-xl font-black italic text-emerald-500 leading-none tracking-tighter">DO OK SCAN</h1>
            <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">HSSI Monitoring Delivery</p>
        </div>
        <div class="text-right bg-emerald-500/10 px-3 py-1 rounded-xl border border-emerald-500/20">
            <p class="text-[9px] text-slate-400 font-bold uppercase">Total Scan</p>
            <p id="total" class="text-3xl font-black text-emerald-500 leading-none">0</p>
        </div>
    </header>

    <!-- Area Scanner -->
    <div class="relative mb-8">
        <div id="reader" class="aspect-square w-full"></div>
        
        <!-- Overlay Gelap di Luar Area Scan (Hanya aktif saat scan jalan) -->
        <div id="scanner-overlay" class="hidden absolute inset-0 pointer-events-none border-[60px] border-black/70 z-10 rounded-2xl"></div>

        <div id="cam-error" class="hidden absolute inset-0 glass rounded-2xl flex flex-col items-center justify-center p-4 text-center bg-slate-900/95 z-20">
            <p class="text-xs font-bold text-red-400 mb-2">Akses Kamera Error</p>
            <button onclick="location.reload()" class="bg-white text-black px-4 py-1.5 rounded-lg text-[10px] font-black uppercase">Refresh Halaman</button>
        </div>

        <div id="cam-off" class="bg-slate-900/50 aspect-square rounded-2xl border-2 border-dashed border-slate-800 flex flex-col items-center justify-center z-10">
            <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Kamera Siap</p>
        </div>
        
        <!-- Tombol Kontrol Scanner -->
        <div class="absolute -bottom-5 left-1/2 -translate-x-1/2 w-4/6 z-30">
            <button id="btn-toggle" onclick="toggleScanner()" class="w-full py-3 bg-emerald-600 text-white rounded-2xl font-black text-[12px] shadow-2xl border-b-4 border-emerald-800 active:scale-95 transition-all uppercase tracking-wider">MULAI SCAN</button>
        </div>
    </div>

    <!-- Area Data Scan -->
    <div class="flex-none h-16 mt-2 overflow-hidden flex flex-col">
        <p class="text-[9px] text-slate-500 font-black uppercase mb-1 px-1 tracking-widest flex justify-between">
            <span>Data Scan (NO LR)</span>
        </p>
        <div id="scan-list" class="glass rounded-xl flex-1 overflow-y-auto p-2 custom-scroll space-y-1">
            <div id="empty-msg" class="h-full flex items-center justify-center text-slate-700 text-[8px] font-bold uppercase">Belum ada data</div>
        </div>
    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Footer Area -->
    <footer class="pb-4 space-y-3">
        <div id="log-msg" class="text-center text-[9px] font-bold uppercase h-3"></div>
        
        <button id="btn-sync" onclick="syncData()" disabled class="w-full bg-blue-600 disabled:opacity-20 py-4 rounded-2xl font-black text-xs border-b-4 border-blue-800 flex items-center justify-center gap-2 transition active:scale-95 shadow-xl shadow-blue-900/20 uppercase tracking-widest">
            KIRIM DATA
        </button>

        <div class="text-center">
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] leading-tight">Monitoring Delivery</p>
            <p class="text-[8px] text-slate-500 font-bold mt-1">Elaborated by SOPARI HSSI0293</p>
            <p class="text-[8px] text-slate-600 mt-0.5 font-bold uppercase tracking-tighter">PT. HANWA STEEL SERVICE INDONESIA © 2026</p>
        </div>
    </footer>

    <audio id="beep" src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw0D2KyciNua6Pt9H4UusHkogacVTpiir8I5h1NqEJREhPkWb4susAHNuGrbMGRj2y5/exec";
        let html5Qr = null;
        let scans = [];
        let active = false;

        async function toggleScanner() {
            const btn = document.getElementById('btn-toggle');
            const off = document.getElementById('cam-off');
            const reader = document.getElementById('reader');
            const overlay = document.getElementById('scanner-overlay');

            if (active) {
                await html5Qr.stop();
                active = false;
                btn.innerText = "MULAI SCAN";
                btn.classList.replace('bg-red-600', 'bg-emerald-600');
                btn.classList.replace('border-red-800', 'border-emerald-800');
                off.classList.remove('hidden');
                overlay.classList.add('hidden');
                reader.classList.remove('scan-active');
            } else {
                if (!html5Qr) html5Qr = new Html5Qrcode("reader");
                off.classList.add('hidden');
                overlay.classList.remove('hidden');
                document.getElementById('cam-error').classList.add('hidden');
                
                const qrSize = Math.min(window.innerWidth * 0.7, 250);

                html5Qr.start(
                    { facingMode: "environment" },
                    { 
                        fps: 25, 
                        qrbox: { width: 220, height: 160 },
                        aspectRatio: 1.0
                    },
                    (text) => {
                        if(scans.some(s => s.raw === text)) return;
                        process(text);
                    }
                ).then(() => {
                    active = true;
                    btn.innerText = "STOP SCAN";
                    btn.classList.replace('bg-emerald-600', 'bg-red-600');
                    btn.classList.replace('border-emerald-800', 'border-red-800');
                    reader.classList.add('scan-active');
                }).catch(err => {
                    document.getElementById('cam-error').classList.remove('hidden');
                    off.classList.remove('hidden');
                    overlay.classList.add('hidden');
                });
            }
        }

        function process(text) {
            document.getElementById('beep').play().catch(()=>{});
            const p = text.split(';');
            const d = new Date();
            const time = d.toLocaleTimeString('en-GB', { hour12: false });
            const date = `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}/${d.getFullYear()}`;

            const item = {
                raw: text, no: p[0]||'ERR', pl: p[1]||'', tr: p[2]||'', wt: p[3]||'', tm: time, dt: date
            };

            scans.unshift(item);
            renderList();
            
            document.getElementById('total').innerText = scans.length;
            document.getElementById('btn-sync').disabled = false;
        }

        function renderList() {
            const list = document.getElementById('scan-list');
            const empty = document.getElementById('empty-msg');
            if(empty) empty.remove();

            list.innerHTML = scans.map(s => `
                <div class="flex items-center justify-between bg-slate-800/50 p-1.5 rounded-lg border-l-4 border-emerald-500 animate-in fade-in slide-in-from-left-2 duration-300">
                    <span class="text-[10px] font-black text-slate-100">${s.no}</span>
                    <span class="text-[8px] font-bold text-slate-500 bg-black/40 px-1.5 py-0.5 rounded-md">${s.tm}</span>
                </div>
            `).join('');
        }

        async function syncData() {
            const btn = document.getElementById('btn-sync');
            const msg = document.getElementById('log-msg');
            
            btn.disabled = true;
            btn.innerText = "PROSES KIRIM...";
            msg.innerText = "☁️ MENGHUBUNGKAN CLOUD...";
            msg.className = "text-center text-[9px] font-bold uppercase text-blue-400";

            const data = scans.map(s => [s.raw, s.no, s.pl, s.tr, s.wt, s.tm, s.dt]);

            try {
                await fetch(API, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "submitData", payload: { rows: data } })
                });

                setTimeout(() => {
                    msg.innerText = "✅ SUKSES TERKIRIM";
                    msg.classList.replace('text-blue-400', 'text-emerald-500');
                    scans = [];
                    document.getElementById('total').innerText = "0";
                    document.getElementById('btn-sync').disabled = true;
                    btn.innerText = "KIRIM DATA";
                    document.getElementById('scan-list').innerHTML = '<div id="empty-msg" class="h-full flex items-center justify-center text-emerald-500/50 text-[9px] italic font-bold">DATA BERHASIL DISIMPAN</div>';
                }, 1000);
            } catch (err) {
                msg.innerText = "❌ GAGAL: CEK SINYAL";
                msg.classList.replace('text-blue-400', 'text-red-500');
                btn.disabled = false;
                btn.innerText = "COBA LAGI";
            }
        }
    </script>
</body>
</html>
