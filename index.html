<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DO OK Scanner - Slim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            overflow: hidden; 
        }
        #reader { 
            width: 100%; 
            border-radius: 1.5rem; 
            overflow: hidden; 
            background: #000; 
            border: 2px solid #1e293b; 
        }
        
        #reader video {
            object-fit: cover !important;
        }

        /* PERBAIKAN: Memastikan kotak pemindaian (viewfinder) muncul di tengah */
        #reader__scan_region {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        
        /* Memberikan border putih pada kotak pemindaian agar terlihat jelas */
        #reader__scan_region svg {
            stroke: #ffffff !important;
            stroke-width: 2px !important;
        }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(51, 65, 85, 0.2); }
        .hidden { display: none !important; }
        .scan-active { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); border-color: #10b981 !important; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 max-w-md mx-auto">

    <!-- Header -->
    <header class="flex justify-between items-end mb-3">
        <div>
            <h1 class="text-xl font-black italic text-emerald-500 leading-none">DO OK SCAN</h1>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">HSSI Monitoring Delivery</p>
        </div>
        <div class="text-right bg-emerald-500/10 px-3 py-1 rounded-xl border border-emerald-500/20">
            <p class="text-[10px] text-slate-400 font-bold uppercase">Total Scan</p>
            <p id="total" class="text-3xl font-black text-emerald-500 leading-none">0</p>
        </div>
    </header>

    <!-- Area Scanner -->
    <div class="relative mb-6">
        <div id="reader" class="aspect-[16/10]"></div>
        
        <div id="cam-error" class="hidden absolute inset-0 glass rounded-3xl flex flex-col items-center justify-center p-4 text-center bg-slate-900/95 z-10">
            <p class="text-xs font-bold text-red-400 mb-2">Akses Kamera Error</p>
            <button onclick="location.reload()" class="bg-white text-black px-4 py-1.5 rounded-lg text-[10px] font-black">REFRESH</button>
        </div>

        <div id="cam-off" class="bg-slate-900/50 aspect-[16/10] rounded-3xl border-2 border-dashed border-slate-800 flex flex-col items-center justify-center">
            <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Kamera Standby</p>
        </div>
        
        <!-- Button Toggle dinaikkan sedikit -->
        <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-3/5 z-20">
            <button id="btn-toggle" onclick="toggleScanner()" class="w-full py-2.5 bg-emerald-600 text-white rounded-xl font-black text-[11px] shadow-xl border-b-4 border-emerald-800 active:scale-95 transition-transform uppercase">MULAI SCAN</button>
        </div>
    </div>

    <!-- Area Data Scan -->
    <div class="flex-none h-20 mt-2 overflow-hidden flex flex-col">
        <p class="text-[9px] text-slate-500 font-black uppercase mb-1 px-1 tracking-widest flex justify-between">
            <span>Data Scan (NO LR)</span>
            <span class="opacity-50 italic text-[8px]">Baru: Atas</span>
        </p>
        <div id="scan-list" class="glass rounded-2xl flex-1 overflow-y-auto p-2 custom-scroll space-y-1">
            <div id="empty-msg" class="h-full flex items-center justify-center text-slate-600 text-[9px] italic uppercase font-bold tracking-tight">Menunggu Data...</div>
        </div>
    </div>

    <!-- Spacer dinamis -->
    <div class="flex-1"></div>

    <!-- Footer Area (Button dipindah lebih ke atas agar footer text terlihat) -->
    <footer class="pb-2 space-y-3">
        <div id="log-msg" class="text-center text-[9px] font-bold uppercase h-3"></div>
        
        <button id="btn-sync" onclick="syncData()" disabled class="w-full bg-blue-600 disabled:opacity-20 py-3 rounded-xl font-black text-xs border-b-4 border-blue-800 flex items-center justify-center gap-2 transition active:scale-95 shadow-lg shadow-blue-900/20">
            KIRIM DATA
        </button>

        <div class="text-center">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-tight">Monitoring Delivery</p>
            <p class="text-[8px] text-slate-500 font-bold mt-0.5">Elaborated by SOPARI HSSI0293</p>
            <p class="text-[8px] text-slate-600 mt-0.5 font-bold opacity-80 uppercase">PT. HANWA STEEL SERVICE INDONESIA © 2026</p>
        </div>
    </footer>

    <audio id="beep" src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw0D2KyciNua6Pt9H4UusHkogacVTpiir8I5h1NqEJREhPkWb4susAHNuGrbMGRj2y5/exec";
        let html5Qr = null;
        let scans = [];
        let active = false;

        async function toggleScanner() {
            const btn = document.getElementById('btn-toggle');
            const off = document.getElementById('cam-off');
            const reader = document.getElementById('reader');

            if (active) {
                await html5Qr.stop();
                active = false;
                btn.innerText = "MULAI SCAN";
                btn.classList.replace('bg-red-600', 'bg-emerald-600');
                btn.classList.replace('border-red-800', 'border-emerald-800');
                off.classList.remove('hidden');
                reader.classList.remove('scan-active');
            } else {
                if (!html5Qr) html5Qr = new Html5Qrcode("reader");
                off.classList.add('hidden');
                document.getElementById('cam-error').classList.add('hidden');
                
                // qrbox diatur 200x150 dan diposisikan tengah via CSS
                html5Qr.start(
                    { facingMode: "environment" },
                    { 
                        fps: 20, 
                        qrbox: { width: 200, height: 150 },
                        aspectRatio: 1.6
                    },
                    (text) => {
                        if(scans.some(s => s.raw === text)) return;
                        process(text);
                    }
                ).then(() => {
                    active = true;
                    btn.innerText = "STOP SCAN";
                    btn.classList.replace('bg-emerald-600', 'bg-red-600');
                    btn.classList.replace('border-emerald-800', 'border-red-800');
                    reader.classList.add('scan-active');
                }).catch(err => {
                    document.getElementById('cam-error').classList.remove('hidden');
                    off.classList.remove('hidden');
                });
            }
        }

        function process(text) {
            document.getElementById('beep').play().catch(()=>{});
            const p = text.split(';');
            const d = new Date();
            const time = d.toLocaleTimeString('en-GB', { hour12: false });
            const date = `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}/${d.getFullYear()}`;

            const item = {
                raw: text, no: p[0]||'ERROR', pl: p[1]||'', tr: p[2]||'', wt: p[3]||'', tm: time, dt: date
            };

            scans.unshift(item);
            renderList();
            
            document.getElementById('total').innerText = scans.length;
            document.getElementById('btn-sync').disabled = false;
        }

        function renderList() {
            const list = document.getElementById('scan-list');
            const empty = document.getElementById('empty-msg');
            if(empty) empty.remove();

            list.innerHTML = scans.map(s => `
                <div class="flex items-center justify-between bg-slate-800/40 p-1.5 rounded-lg border-l-4 border-emerald-500 animate-in fade-in slide-in-from-left-2 duration-300">
                    <span class="text-[10px] font-black text-slate-100 tracking-tight">${s.no}</span>
                    <span class="text-[8px] font-bold text-slate-500 bg-slate-900/50 px-1.5 py-0.5 rounded-md">${s.tm}</span>
                </div>
            `).join('');
        }

        async function syncData() {
            const btn = document.getElementById('btn-sync');
            const msg = document.getElementById('log-msg');
            
            btn.disabled = true;
            btn.innerText = "MENGIRIM...";
            msg.innerText = "☁️ SINKRONISASI...";
            msg.className = "text-center text-[9px] font-bold uppercase text-blue-400";

            const data = scans.map(s => [s.raw, s.no, s.pl, s.tr, s.wt, s.tm, s.dt]);

            try {
                await fetch(API, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "submitData", payload: { rows: data } })
                });

                setTimeout(() => {
                    msg.innerText = "✅ DATA BERHASIL TERKIRIM";
                    msg.classList.replace('text-blue-400', 'text-emerald-500');
                    scans = [];
                    document.getElementById('total').innerText = "0";
                    document.getElementById('btn-sync').disabled = true;
                    btn.innerText = "KIRIM DATA";
                    document.getElementById('scan-list').innerHTML = '<div id="empty-msg" class="h-full flex items-center justify-center text-emerald-500/50 text-[9px] italic font-bold">DATA TERKIRIM!</div>';
                }, 1000);
            } catch (err) {
                msg.innerText = "❌ GAGAL: CEK KONEKSI";
                msg.classList.replace('text-blue-400', 'text-red-500');
                btn.disabled = false;
                btn.innerText = "COBA LAGI";
            }
        }
    </script>
</body>
</html>
