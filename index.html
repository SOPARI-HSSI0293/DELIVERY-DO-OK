<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DO OK Scanner - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        #reader { width: 100%; border-radius: 2rem; overflow: hidden; background: #000; border: 2px solid #1e293b; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.3); }
        .hidden { display: none !important; }
        /* Animasi berdenyut saat scanning */
        .scan-active { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); border-color: #10b981 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <!-- LOGIN SECTION -->
    <div id="login-view" class="w-full max-w-md min-h-screen flex items-center justify-center p-6">
        <div class="w-full glass rounded-[3rem] p-10 shadow-2xl border-t-4 border-t-emerald-500 text-center">
            <div class="w-20 h-20 bg-emerald-500/10 rounded-3xl border border-emerald-500/20 flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
            </div>
            <h1 class="text-3xl font-black mb-2 italic">DO OK SCAN</h1>
            <p class="text-slate-500 text-sm mb-8">Gunakan akun Usercontrol Anda</p>
            
            <form onsubmit="doLogin(event)" class="space-y-4 text-left">
                <input type="text" id="user" placeholder="Username" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-4 px-6 focus:ring-2 focus:ring-emerald-500 outline-none" required>
                <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-4 px-6 focus:ring-2 focus:ring-emerald-500 outline-none" required>
                <button type="submit" id="btn-login" class="w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl font-black text-lg shadow-lg shadow-emerald-900/40 transition-all active:scale-95">MASUK</button>
            </form>
        </div>
    </div>

    <!-- SCANNER SECTION -->
    <div id="scanner-view" class="w-full max-w-md min-h-screen flex flex-col hidden">
        <header class="p-6 flex justify-between items-center glass border-b border-slate-800 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center font-black">OP</div>
                <div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Operator</p>
                    <p id="user-label" class="font-bold text-sm"></p>
                </div>
            </div>
            <button onclick="doLogout()" class="p-2 bg-slate-800 rounded-xl text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
        </header>

        <main class="p-6 flex flex-col gap-6 flex-1">
            <!-- Camera Interface -->
            <div class="relative">
                <div id="reader"></div>
                
                <!-- Overlay Pesan Error Kamera -->
                <div id="cam-error" class="hidden absolute inset-0 glass rounded-[2rem] flex flex-col items-center justify-center p-8 text-center bg-slate-900/90 z-10">
                    <div class="p-4 bg-red-500/10 rounded-full mb-4">
                        <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </div>
                    <p class="font-bold text-red-400 mb-2">Akses Kamera Ditolak</p>
                    <p class="text-xs text-slate-400 mb-6 leading-relaxed">Pastikan Anda memberikan izin kamera di pengaturan browser. Jangan buka dari WhatsApp, gunakan Chrome langsung.</p>
                    <button onclick="requestCam()" class="bg-white text-black px-6 py-2 rounded-xl text-xs font-black">COBA LAGI</button>
                </div>

                <div id="cam-off" class="bg-slate-900/50 aspect-square rounded-[2rem] border-2 border-dashed border-slate-800 flex flex-col items-center justify-center gap-4">
                    <p class="text-xs font-black text-slate-600 uppercase tracking-widest">Kamera Nonaktif</p>
                </div>
                
                <div class="absolute -bottom-6 left-1/2 -translate-x-1/2 flex gap-2">
                    <button id="btn-toggle" onclick="toggleScanner()" class="px-8 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-2xl border-b-4 border-emerald-800 transition transform active:scale-95">MULAI SCAN</button>
                </div>
            </div>

            <!-- Dashboard -->
            <div class="mt-12 grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-3xl">
                    <p class="text-[10px] text-slate-500 font-black uppercase mb-1">Berhasil Scan</p>
                    <p id="total" class="text-5xl font-black text-emerald-500">0</p>
                </div>
                <div class="glass p-6 rounded-3xl flex flex-col justify-center">
                    <div id="status-dot" class="flex items-center gap-2 mb-1">
                        <div class="w-2 h-2 rounded-full bg-slate-600"></div>
                        <span class="text-[10px] font-black text-slate-400 uppercase">Standby</span>
                    </div>
                    <p class="text-xs font-bold">Siap Kirim</p>
                </div>
            </div>

            <!-- Preview Card -->
            <div id="preview-box" class="glass p-6 rounded-3xl opacity-30 transition-opacity">
                <p class="text-[10px] text-slate-500 font-black uppercase mb-3">Item Terakhir</p>
                <div id="item-info" class="text-sm font-bold text-slate-400 italic">Belum ada data...</div>
            </div>
            
            <div id="log-msg" class="text-center text-[10px] font-bold uppercase hidden"></div>
        </main>

        <footer class="p-6 bg-slate-900 border-t border-slate-800">
            <button id="btn-sync" onclick="syncData()" disabled class="w-full bg-blue-600 disabled:opacity-20 py-5 rounded-2xl font-black text-lg border-b-4 border-blue-800 flex items-center justify-center gap-3 transition transform active:scale-95">
                SINKRON KE DO OK
            </button>
        </footer>
    </div>

    <audio id="beep" src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw0D2KyciNua6Pt9H4UusHkogacVTpiir8I5h1NqEJREhPkWb4susAHNuGrbMGRj2y5/exec";
        let html5Qr = null;
        let scans = [];
        let active = false;

        // --- AUTH ---
        function doLogin(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            document.getElementById('btn-login').innerText = "MEMPROSES...";
            
            // Kirim request login (no-cors)
            fetch(API, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify({ action: "login", payload: { username: u } }) 
            });

            document.getElementById('user-label').innerText = u;
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('scanner-view').classList.remove('hidden');
        }

        function doLogout() {
            if(active) toggleScanner();
            location.reload();
        }

        // --- CAMERA HANDLING ---
        async function requestCam() {
            document.getElementById('cam-error').classList.add('hidden');
            toggleScanner();
        }

        async function toggleScanner() {
            const btn = document.getElementById('btn-toggle');
            const off = document.getElementById('cam-off');
            const reader = document.getElementById('reader');
            const dot = document.getElementById('status-dot');

            if (active) {
                await html5Qr.stop();
                active = false;
                btn.innerText = "MULAI SCAN";
                btn.classList.replace('bg-red-600', 'bg-emerald-600');
                btn.classList.replace('border-red-800', 'border-emerald-800');
                off.classList.remove('hidden');
                reader.classList.remove('scan-active');
                dot.innerHTML = '<div class="w-2 h-2 rounded-full bg-slate-600"></div><span class="text-[10px] font-black text-slate-400 uppercase">Standby</span>';
            } else {
                if (!html5Qr) html5Qr = new Html5Qrcode("reader");
                
                off.classList.add('hidden');
                document.getElementById('cam-error').classList.add('hidden');
                
                html5Qr.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: { width: 250, height: 250 } },
                    (text) => {
                        if(scans.some(s => s.raw === text)) return;
                        process(text);
                    }
                ).then(() => {
                    active = true;
                    btn.innerText = "STOP SCAN";
                    btn.classList.replace('bg-emerald-600', 'bg-red-600');
                    btn.classList.replace('border-emerald-800', 'border-red-800');
                    reader.classList.add('scan-active');
                    dot.innerHTML = '<div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div><span class="text-[10px] font-black text-emerald-500 uppercase">Scanning</span>';
                }).catch(err => {
                    console.error(err);
                    document.getElementById('cam-error').classList.remove('hidden');
                    off.classList.remove('hidden');
                });
            }
        }

        function process(text) {
            document.getElementById('beep').play().catch(()=>{});
            const p = text.split(';');
            const d = new Date();
            const time = d.toLocaleTimeString('en-GB', { hour12: false });
            const date = `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}/${d.getFullYear()}`;

            const item = {
                raw: text, no: p[0]||'', pl: p[1]||'', tr: p[2]||'', wt: p[3]||'', tm: time, dt: date
            };

            scans.unshift(item);
            
            // Update UI
            document.getElementById('total').innerText = scans.length;
            document.getElementById('btn-sync').disabled = false;
            document.getElementById('preview-box').classList.remove('opacity-30');
            document.getElementById('item-info').innerHTML = `
                <div class="text-emerald-500 text-xl font-black font-mono leading-none">${item.no}</div>
                <div class="text-slate-100 text-sm mt-1">${item.pl}</div>
                <div class="text-[9px] text-slate-500 mt-1 uppercase font-black">${item.tr} • ${item.wt} KG</div>
            `;
        }

        async function syncData() {
            const btn = document.getElementById('btn-sync');
            const msg = document.getElementById('log-msg');
            
            btn.disabled = true;
            btn.innerText = "MENGIRIM...";
            msg.classList.remove('hidden', 'text-red-500', 'text-emerald-500');
            msg.classList.add('text-blue-400');
            msg.innerText = "Sedang sinkronisasi data ke Cloud...";

            const data = scans.map(s => [s.raw, s.no, s.pl, s.tr, s.wt, s.tm, s.dt]);

            try {
                await fetch(API, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "submitData", payload: { rows: data } })
                });

                setTimeout(() => {
                    msg.innerText = "✅ DATA BERHASIL DISIMPAN KE DO OK";
                    msg.classList.replace('text-blue-400', 'text-emerald-500');
                    scans = [];
                    document.getElementById('total').innerText = "0";
                    document.getElementById('btn-sync').disabled = true;
                    btn.innerText = "SINKRON KE DO OK";
                    document.getElementById('preview-box').classList.add('opacity-30');
                    document.getElementById('item-info').innerText = "Data terkirim!";
                }, 1500);
            } catch (err) {
                msg.innerText = "❌ GAGAL: CEK KONEKSI INTERNET";
                msg.classList.replace('text-blue-400', 'text-red-500');
                btn.disabled = false;
                btn.innerText = "COBA LAGI";
            }
        }
    </script>
</body>
</html>
