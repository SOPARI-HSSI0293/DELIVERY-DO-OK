<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DO OK Scanner - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            overflow: hidden; 
            height: 100vh;
        }
        
        #reader { 
            width: 100%; 
            border-radius: 1.5rem; 
            overflow: hidden; 
            background: #000; 
            border: 2px solid #1e293b; 
            position: relative;
        }
        
        #reader video {
            object-fit: cover !important;
            filter: brightness(0.4);
        }

        /* Area Fokus Scan */
        #reader__scan_region {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            z-index: 5;
        }
        
        #reader__scan_region canvas {
            filter: brightness(2.5);
            border-radius: 12px;
        }

        #reader__scan_region svg {
            stroke: #10b981 !important;
            stroke-width: 5px !important;
            filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.9));
        }

        #reader__dashboard_section_csr span { display: none !important; }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.3); }
        .hidden { display: none !important; }
        
        /* State Tombol yang Jelas */
        .btn-primary {
            background: #059669;
            border-bottom: 4px solid #064e3b;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }
        .btn-danger {
            background: #dc2626;
            border-bottom: 4px solid #7f1d1d;
            box-shadow: 0 10px 25px -5px rgba(220, 38, 38, 0.4);
        }
        .btn-sync {
            background: #2563eb;
            border-bottom: 4px solid #1e3a8a;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.3);
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col p-5 max-w-md mx-auto">

    <!-- Header Section -->
    <header class="flex justify-between items-center mb-4">
        <div>
            <h1 class="text-2xl font-black italic text-emerald-500 tracking-tighter leading-none">DO OK SCAN</h1>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-1">HSSI Monitoring Delivery</p>
        </div>
        <div class="bg-emerald-500/10 border border-emerald-500/20 px-4 py-2 rounded-2xl text-right">
            <p class="text-[8px] text-slate-400 font-black uppercase">Total</p>
            <p id="total" class="text-2xl font-black text-emerald-500 leading-none">0</p>
        </div>
    </header>

    <!-- Main Scanner Interface -->
    <div class="relative flex-none mb-10">
        <div id="reader" class="aspect-square w-full shadow-2xl"></div>
        
        <!-- Overlay Gelap (Masking) -->
        <div id="scanner-overlay" class="hidden absolute inset-0 pointer-events-none border-[50px] border-black/80 z-10 rounded-[1.5rem]"></div>

        <!-- Camera Standby / Off View -->
        <div id="cam-off" class="absolute inset-0 bg-slate-900/60 flex flex-col items-center justify-center z-10 rounded-[1.5rem] border-2 border-dashed border-slate-700">
            <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mb-3">
                <svg class="w-8 h-8 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
            </div>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Kamera Siap Digunakan</p>
        </div>

        <!-- Tombol Utama (Position Absolute & High Z-Index) -->
        <div class="absolute -bottom-6 left-0 right-0 flex justify-center z-50 px-10">
            <button id="btn-toggle" onclick="toggleScanner()" class="w-full py-4 text-white rounded-2xl font-black text-sm uppercase tracking-widest transition-all active:scale-90 btn-primary">
                MULAI SCAN
            </button>
        </div>
    </div>

    <!-- Data List Section -->
    <div class="flex-1 flex flex-col min-h-0">
        <div class="flex justify-between items-center mb-2 px-1">
            <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest">Daftar Scan (NO LR)</p>
            <p class="text-[8px] text-slate-600 font-bold uppercase">Terbaru di Atas</p>
        </div>
        
        <div id="scan-list" class="glass rounded-2xl flex-1 overflow-y-auto p-3 custom-scroll space-y-2">
            <div id="empty-msg" class="h-full flex items-center justify-center">
                <p class="text-slate-700 text-[10px] font-bold uppercase tracking-tighter">Belum ada data scan...</p>
            </div>
        </div>
    </div>

    <!-- Footer Action -->
    <footer class="mt-6 space-y-4">
        <div id="log-msg" class="text-center text-[10px] font-bold uppercase h-4"></div>
        
        <button id="btn-sync" onclick="syncData()" disabled class="w-full py-4 rounded-2xl font-black text-sm text-white uppercase tracking-widest transition-all active:scale-95 btn-sync disabled:opacity-20 disabled:grayscale">
            KIRIM KE DATABASE
        </button>

        <div class="text-center opacity-40">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em]">HSSI | SOPARI | DELIVERY</p>
            <p class="text-[8px] text-slate-600 font-bold mt-1 uppercase">PT. HANWA STEEL SERVICE INDONESIA © 2026</p>
        </div>
    </footer>

    <audio id="beep" src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw0D2KyciNua6Pt9H4UusHkogacVTpiir8I5h1NqEJREhPkWb4susAHNuGrbMGRj2y5/exec";
        let html5Qr = null;
        let scans = [];
        let active = false;

        async function toggleScanner() {
            const btn = document.getElementById('btn-toggle');
            const off = document.getElementById('cam-off');
            const overlay = document.getElementById('scanner-overlay');

            if (active) {
                await html5Qr.stop();
                active = false;
                btn.innerText = "MULAI SCAN";
                btn.className = "w-full py-4 text-white rounded-2xl font-black text-sm uppercase tracking-widest transition-all active:scale-90 btn-primary";
                off.classList.remove('hidden');
                overlay.classList.add('hidden');
            } else {
                if (!html5Qr) html5Qr = new Html5Qrcode("reader");
                off.classList.add('hidden');
                overlay.classList.remove('hidden');
                
                html5Qr.start(
                    { facingMode: "environment" },
                    { 
                        fps: 25, 
                        qrbox: { width: 220, height: 160 },
                        aspectRatio: 1.0
                    },
                    (text) => {
                        if(scans.some(s => s.raw === text)) return;
                        process(text);
                    }
                ).then(() => {
                    active = true;
                    btn.innerText = "STOP SCAN";
                    btn.className = "w-full py-4 text-white rounded-2xl font-black text-sm uppercase tracking-widest transition-all active:scale-90 btn-danger";
                }).catch(err => {
                    off.classList.remove('hidden');
                    overlay.classList.add('hidden');
                    console.error(err);
                });
            }
        }

        function process(text) {
            document.getElementById('beep').play().catch(()=>{});
            const p = text.split(';');
            const d = new Date();
            const time = d.toLocaleTimeString('en-GB', { hour12: false });
            const date = `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}/${d.getFullYear()}`;

            const item = {
                raw: text, no: p[0]||'ERROR', pl: p[1]||'', tr: p[2]||'', wt: p[3]||'', tm: time, dt: date
            };

            scans.unshift(item);
            renderList();
            
            document.getElementById('total').innerText = scans.length;
            document.getElementById('btn-sync').disabled = false;
        }

        function renderList() {
            const list = document.getElementById('scan-list');
            list.innerHTML = scans.map(s => `
                <div class="flex items-center justify-between bg-slate-800/40 p-3 rounded-xl border-l-4 border-emerald-500 shadow-sm">
                    <span class="text-xs font-black text-slate-100">${s.no}</span>
                    <span class="text-[9px] font-bold text-slate-400 bg-slate-900/80 px-2 py-1 rounded-lg">${s.tm}</span>
                </div>
            `).join('');
        }

        async function syncData() {
            const btn = document.getElementById('btn-sync');
            const msg = document.getElementById('log-msg');
            
            btn.disabled = true;
            btn.innerText = "MENGIRIM...";
            msg.innerText = "☁️ MENGHUBUNGKAN CLOUD...";
            msg.className = "text-center text-[10px] font-black uppercase text-blue-400";

            const data = scans.map(s => [s.raw, s.no, s.pl, s.tr, s.wt, s.tm, s.dt]);

            try {
                await fetch(API, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "submitData", payload: { rows: data } })
                });

                setTimeout(() => {
                    msg.innerText = "✅ DATA BERHASIL DISIMPAN";
                    msg.className = "text-center text-[10px] font-black uppercase text-emerald-500";
                    scans = [];
                    document.getElementById('total').innerText = "0";
                    document.getElementById('btn-sync').disabled = true;
                    btn.innerText = "KIRIM KE DATABASE";
                    document.getElementById('scan-list').innerHTML = '<div class="h-full flex items-center justify-center text-emerald-500/30 text-[10px] font-black italic">DATABASE UPDATED</div>';
                }, 1000);
            } catch (err) {
                msg.innerText = "❌ ERROR JARINGAN";
                msg.className = "text-center text-[10px] font-black uppercase text-red-500";
                btn.disabled = false;
                btn.innerText = "COBA LAGI";
            }
        }
    </script>
</body>
</html>
